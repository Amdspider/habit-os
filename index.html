```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitOS V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

h1{
text-align:center;
}

.card{
background:#1e293b;
border-radius:16px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

button{
background:#22c55e;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
font-weight:bold;
}

input{
border:none;
border-radius:8px;
padding:6px;
margin:3px;
}

.hidden{
display:none;
}

.quote{
color:#38bdf8;
font-style:italic;
}

</style>

</head>

<body>

<h1>HabitOS V3</h1>

<div class="card">

<h3>Habits</h3>

<label>
<input type="checkbox" id="gymCheck" onchange="toggleGym()"> Gym
</label><br>

<label>
<input type="checkbox"> Coding
</label><br>

<label>
<input type="checkbox"> Reading
</label>

<br><br>

<input id="habitInput" placeholder="New habit">
<button onclick="addHabit()">Add</button>

</div>

<div id="gymTracker" class="card hidden">

<h3>Gym Tracker</h3>

Exercise
<input id="exercise">

Reps
<input id="reps" type="number">

Weight
<input id="weight" type="number">

<button onclick="saveWorkout()">Save</button>

</div>

<div class="card">

<h3>Motivation</h3>

<div class="quote" id="quote"></div>

</div>

<div class="card">

<h3>Performance</h3>

<canvas id="chart"></canvas>

</div>

<script>

const quotes=[

"Dream is not that which you see while sleeping, it is something that does not let you sleep. — APJ Abdul Kalam",

"Excellence happens not by accident. It is a process. — APJ Abdul Kalam",

"If you want to shine like a sun, first burn like a sun. — APJ Abdul Kalam"

]

document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)]


function toggleGym(){

let gym=document.getElementById("gymCheck").checked
let tracker=document.getElementById("gymTracker")

if(gym){
tracker.classList.remove("hidden")
}else{
tracker.classList.add("hidden")
}

}


function addHabit(){

let name=document.getElementById("habitInput").value

if(name==="")return

let label=document.createElement("label")

label.innerHTML="<input type='checkbox'> "+name

document.querySelector(".card").appendChild(label)

}


function saveWorkout(){

let weight=document.getElementById("weight").value

if(weight==="")return

chart.data.datasets[0].data.push(weight)

chart.update()

}


let ctx=document.getElementById("chart")

let chart=new Chart(ctx,{
type:"radar",
data:{
labels:["Habits","Gym","Reading","Coding","Focus"],
datasets:[{
label:"Performance",
data:[60,50,70,80,65],
backgroundColor:"rgba(34,197,94,0.3)"
}]
}
})

</script>

</body>
</html>
```
